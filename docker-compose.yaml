# mcp-switchboard — self-host deployment.
#
# Quick start:
#   cp .env.example .env        # optional: pin a token, else one is auto-generated
#   docker compose up -d
#   docker compose logs switchboard   # shows the token to give your agents
#
# Prebuilt image only — no build context required.
services:
  switchboard:
    image: ghcr.io/jemplayer82/mcp-switchboard:latest
    container_name: switchboard
    restart: unless-stopped
    ports:
      - "${SWITCHBOARD_PORT:-3107}:3107"
    environment:
      PORT: "3107"
      # Leave SWITCHBOARD_MCP_TOKEN unset to auto-generate one on first boot
      # (persisted to the volume, printed in the logs). Set it to pin your own.
      SWITCHBOARD_MCP_TOKEN: ${SWITCHBOARD_MCP_TOKEN:-}
      SWITCHBOARD_DB_PATH: /data/switchboard.db
      # Optional: the public URL agents reach this on (behind a proxy / custom
      # domain). If unset, the server derives it from each request's Host header.
      SWITCHBOARD_PUBLIC_BASE: ${SWITCHBOARD_PUBLIC_BASE:-}
    volumes:
      - switchboard_data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3107/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  switchboard_data:
    driver: local
