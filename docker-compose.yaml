# Standalone Portainer stack for mcp-switchboard (Web Server endpoint 3).
# Prebuilt image only — never `build:` on a Portainer/edge stack.
#
# Deployed as its own stack rather than merged into mcp-shared to keep zero
# blast radius on that production multi-service stack. It can be folded into
# mcp-shared later by moving this service block under that stack's `services:`.
services:
  switchboard-mcp:
    image: ghcr.io/jemplayer82/mcp-switchboard:latest
    container_name: switchboard-mcp
    restart: unless-stopped
    ports:
      - "3108:3107"   # host 3108 (3107 taken by mcp-home-assistant) -> container 3107
    environment:
      PORT: "3107"
      SWITCHBOARD_MCP_TOKEN: ${SWITCHBOARD_MCP_TOKEN}
      SWITCHBOARD_DB_PATH: /data/switchboard.db
    volumes:
      - switchboard_data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3107/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  switchboard_data:
    driver: local
